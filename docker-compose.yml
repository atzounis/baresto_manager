services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8765 config.asgi:application
    ports:
      - "8765:8765"
    env_file: .env
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: baresto
      POSTGRES_USER: baresto
      POSTGRES_PASSWORD: baresto
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  pg_data:
  media_data:
